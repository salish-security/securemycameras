<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Shield body -->
  <path d="M256 42L60 132v120c0 118 84 228 196 260 112-32 196-142 196-260V132L256 42z" fill="#0f172a" stroke="#1e293b" stroke-width="8"/>
  
